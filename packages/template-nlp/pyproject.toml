[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nlp-fastapi-app"
version = "0.1.0"
description = "FastAPI application with NLP capabilities"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi==0.139.0",
  "uvicorn[standard]==0.51.0",
  "transformers[torch]==5.13.1",
  "sentence-transformers==5.6.0",
  "pydantic-settings==2.14.2",
  "torch==2.13.0",
  "accelerate==1.14.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/nlp"]

[dependency-groups]
dev = [
  "ruff==0.15.21",
  "pytest==9.1.1",
  "httpx==0.28.1",
]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I"]
