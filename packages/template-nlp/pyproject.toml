[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nlp-fastapi-app"
version = "0.1.0"
description = "FastAPI application with NLP capabilities"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi==0.136.3",
  "uvicorn[standard]==0.49.0",
  "transformers[torch]==5.12.0",
  "sentence-transformers==5.5.1",
  "pydantic-settings==2.14.1",
  "torch==2.12.1",
  "accelerate==1.14.0",
]

[dependency-groups]
dev = [
  "ruff==0.15.18",
  "pytest==9.1.1",
  "httpx==0.28.1",
]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I"]
