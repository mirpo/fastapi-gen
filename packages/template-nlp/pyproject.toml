[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nlp-fastapi-app"
version = "0.1.0"
description = "FastAPI application with NLP capabilities"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi==0.135.2",
  "uvicorn[standard]==0.42.0",
  "transformers[torch]==4.57.6",
  "sentence-transformers==5.4.1",
  "pydantic-settings==2.13.1",
  "torch==2.11.0",
  "accelerate==1.13.0",
]

[dependency-groups]
dev = [
  "ruff==0.15.10",
  "pytest==9.0.3",
  "httpx==0.28.1",
]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I"]
