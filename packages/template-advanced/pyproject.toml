[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "advanced-fastapi-app"
version = "0.1.0"
description = "Advanced FastAPI application with auth, database, etc."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi==0.139.0",
  "uvicorn[standard]==0.50.0",
  "pydantic-settings==2.14.2",
  "sqlalchemy==2.0.51",
  "pyjwt==2.13.0",
  "bcrypt==5.0.0",
  "slowapi==0.1.10",
  "python-multipart==0.0.32",
  "email-validator==2.3.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/advanced"]

[dependency-groups]
dev = [
  "ruff==0.15.21",
  "pytest==9.1.1",
  "httpx==0.28.1",
]

[tool.ruff]
target-version = "py311"
line-length = 120
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I"]
